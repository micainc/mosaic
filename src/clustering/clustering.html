<!DOCTYPE html>
<html>
    <head>
        <title>Clustering</title>
        <link rel="stylesheet" href="./clustering.css">

    </head>
    <body>
        <div id="toolbar"></div>

        <div id="clustering-options-menu" class="options-menu hidden">
            <div class="options-content">
                <h3>Clustering Options</h3>
                
                <div class="option-section">
                    <label>Select Images to Cluster:</label>
                    <div id="image-selection-list" class="checkbox-list">
                        <!-- Image checkboxes will be populated dynamically -->
                    </div>
                </div>
                
                <div class="option-section">
                    <label>
                        <input type="checkbox" id="grayscale-option"> Convert to Grayscale
                    </label>
                </div>
                
                <div class="option-section">
                    <label for="cluster-count">Number of Clusters:</label>
                    <input type="range" id="cluster-count" min="2" max="32" value="16">
                    <span id="cluster-count-value">16</span>
                </div>
                
                <div class="option-section">
                    <label for="compactness-slider">Compactness:</label>
                    <input type="range" id="compactness-slider" min="0" max="2" step="0.1" value="0.0">
                    <span id="compactness-value">0.0</span>
                </div>
                
                <div class="option-buttons">
                    <button id="cluster-submit" class="primary-button">Apply Clustering</button>
                    <button id="cluster-cancel" class="secondary-button">Cancel</button>
                </div>
            </div>
        </div>

        <script src="clustering.js"></script>

    </body>
</html>
