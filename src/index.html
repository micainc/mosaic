<!DOCTYPE html>

<html>
    <head>
        <meta charset="UTF-8" />

        <script type="text/javascript" src="../node_modules/jquery/dist/jquery.min.js"></script>
        <script type="text/javascript" src="../node_modules/jquery-ui/dist/jquery-ui.min.js"></script>
        <script src="./UTIF.js"></script>
        <script src="../main.js"></script>
        <link rel="stylesheet" href="index.css">
        <link href='https://fonts.googleapis.com/css?family=Hanken Grotesk' rel='stylesheet'>
        <title>Mapier</title>
    </head>
    <body>
        <div class="cursor"></div>
        <div id="parameters">
            <div id="parameters-paths">
                <button class="parameter-button" onclick="findRegions()"><img width="20px" src="./images/save_folder.png" ><span class="path" id="save-path">&nbsp; Save...</span></button> 
            </div>
            <div id="parameters-file">
                <button onclick="cycleImage(-1)"><<</button><span id="parameters-filename">Drag image set below...</span><button onclick="cycleImage(1)">>></button>
            </div>
            <div id="parameters-right">
                <div id="coords"></div>
                <button class="parameter-button" onclick="toggleZoom()"><img id="zoom-img" width="20px" src="./images/zoom_1.png"></button> 

                <input class="slider" id="cursor-size-slider" type="range" min="10" max="200" value="10">

                <div class="custom-select" id="loadouts">
                    <select></select>
                </div>
                <div class="custom-select" id="labels">
                    <select></select>
                </div>

            </div>
        </div>

        <canvas class= "mapier-canvas" id="image-canvas"></canvas>
        <canvas class= "mapier-canvas" id="draw-canvas"></canvas>
        <canvas class= "mapier-canvas" id="temp-canvas"></canvas>

    </body>
    <script src="./selector.js"></script>

    <script src="./index.js"></script>
    <script src="./rgbs.js"></script>


</html>
