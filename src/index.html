<!DOCTYPE html>

<html>
    <head>
        <meta charset="UTF-8" />

        <script type="text/javascript" src="../node_modules/jquery/dist/jquery.min.js"></script>
        <script type="text/javascript" src="../node_modules/jquery-ui/dist/jquery-ui.min.js"></script>
        <script src="./UTIF.js"></script>
        <script src="../main.js"></script>
        <link rel="stylesheet" href="index.css">
        <link href='https://fonts.googleapis.com/css?family=Hanken Grotesk' rel='stylesheet'>
        <title>Mosaic</title>
    </head>
    <body>
        <div id="cursor"><div id="cursor-text"></div></div>
        <div id="toolbar">
            <div id="toolbar-paths">
                <button class="parameter-button" onclick="findRegions()"><img width="20px" src="./images/save_folder.png" ><span class="path" id="save-path">&nbsp; Save...</span></button> 
            </div>
            <div id="toolbar-file">
                <button onclick="cycleImage(-1)"><img src="./images/left-arrow.png" width="10px"/></button><span id="toolbar-filename">Drag image set below...</span><button onclick="cycleImage(1)"><img src="./images/right-arrow.png" width="10px"/></button>
            </div>
            <div id="toolbar-right">
                <!-- <div id="coords"></div> -->
                
                <button id="pencil-button" class="parameter-button tool selected-tool" onclick="selectPencil(this)"><img id="pencil-img" width="20px" src="./images/pencil.png"></button>
                <button id="fill-button" class="parameter-button tool" onclick="selectFill(this)"><img id="fill-img" width="20px" src="./images/bucket.png"></button>

                <button class="parameter-button" onclick="toggleZoom()"><img id="zoom-img" width="20px" src="./images/zoom_1.png"></button> 

                <input class="slider" id="cursor-size-slider" type="range" min="10" max="200" value="10">

                <div class="toolbar-list" id="loadouts">
                    <div class="items hidden"></div>
                </div>
                <div class="toolbar-list" id="labels">
                    <div class="items hidden"></div>

                </div>

            </div>
        </div>

        <canvas class= "mosaic-canvas" id="image-canvas"></canvas>
        <canvas class= "mosaic-canvas" id="draw-canvas"></canvas>
        <canvas class= "mosaic-canvas" id="save-canvas"></canvas>

    </body>
    <script src="./selector.js"></script>
    <script src="./index.js"></script>
    <script src="./rgbs.js"></script>
    <script src="./tools.js"></script>

</html>
