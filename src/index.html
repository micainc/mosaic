<!DOCTYPE html>

<html>
    <head>
        <meta charset="UTF-8" />
        <link rel="stylesheet" href="index.css">
        <link href='https://fonts.googleapis.com/css?family=Hanken Grotesk' rel='stylesheet'>
        <title>Mosaic</title>
    </head>
    <body>
        <script>
            function loadScript(src) {
                return new Promise((resolve, reject) => {
                    const script = document.createElement('script');
                    script.src = src;
                    script.onload = resolve;
                    script.onerror = reject;
                    document.head.appendChild(script);
                });
            }

            async function loadDependencies() {
                try {
                    await loadScript('../node_modules/jquery/dist/jquery.min.js');
                    await loadScript('../node_modules/jquery-ui/dist/jquery-ui.min.js');
                    console.log('jQuery and jQuery UI loaded');

                    // Now load your app scripts
                    await loadScript('./selector.js');
                    await loadScript('./rgb-utils.js');
                    await loadScript('./tools.js');
                    await loadScript('./classifier.js');
                    await loadScript('./index.js');  // Load this last as it has your init code

                    // If you have any initialization that needs to run after all scripts are loaded,
                    // you can call it here
                    if (typeof initApp === 'function') {
                        initApp();
                    }
                } catch (error) {
                    console.error('Error loading scripts:', error);
                }
            }

            loadDependencies();
        </script>



        <div id="cursor"><div id="cursor-text"></div></div>
        <div id="toolbar">
            
            <div id="toolbar-paths">
                <button class="toolbar-button" onclick="findRegions()"><img width="20px" src="./public/img/save_folder.png" ><span class="path" id="save-path">&nbsp; Save...</span></button> 
            </div>
            <div id="toolbar-file">
                <button onclick="cycleImage(-1)"><img src="./public/img/left-arrow.png" width="10px"/></button><span id="toolbar-filename">Drag image set below...</span><button onclick="cycleImage(1)"><img src="./public/img/right-arrow.png" width="10px"/></button>
            </div>
            <div id="toolbar-right">
                <!-- <div id="coords"></div> -->
                <button id="undo-button" class="toolbar-button" onclick="undo()"><img id="undo-img" width="20px" src="./public/img/undo.png"></button></button>
                <button id="pencil-button" class="toolbar-button tool selected-tool" onclick="selectPencil(this)"><img id="pencil-img" width="20px" src="./public/img/pencil.png"></button>
                <button id="fill-button" class="toolbar-button tool" onclick="selectFill(this)"><img id="fill-img" width="20px" src="./public/img/bucket.png"></button>
                <button id="wand-button" class="toolbar-button tool" onclick="selectWand(this)"><img id="fill-img" width="20px" src="./public/img/wand.png"></button>
                <button id="ai-button" class="toolbar-button" onclick="handleApplyClassifier()"><img id="fill-img" width="20px" src="./public/img/ai.png"></button>

                <button class="toolbar-button" onclick="toggleZoomLevel()"><img id="zoom-img" width="20px" src="./public/img/zoom_1.png"></button> 

                <input class="slider" id="cursor-size-slider" type="range" min="5" max="100" value="10">

                <div class="toolbar-list" id="loadouts">
                    <div class="items hidden"></div>
                </div>
                <div class="toolbar-list" id="labels">
                    <div class="items hidden"></div>

                </div>

            </div>
        </div>

        <canvas class= "mosaic-canvas" id="image-canvas"></canvas>
        <canvas class= "mosaic-canvas" id="draw-canvas"></canvas>
        <canvas class= "mosaic-canvas" id="save-canvas"></canvas>

    </body>
</html>
