<!DOCTYPE html>

<html>
    <head>
        <meta charset="UTF-8" />

        <script type="text/javascript" src="../node_modules/jquery/dist/jquery.min.js"></script>
        <script type="text/javascript" src="../node_modules/jquery-ui/dist/jquery-ui.min.js"></script>

        <script src="../main.js"></script>

        <link rel="stylesheet" href="index.css">
        <link href='https://fonts.googleapis.com/css?family=Hanken Grotesk' rel='stylesheet'>
        <title>Mapier</title>
    </head>
    <body>
        <div class="cursor"></div>
        <div id="parameters">
            <div id="coords"></div>
            <input class="slider" id="cursor-size-slider" type="range" min="10" max="200" value="50">
            <button class="colour-class" style="background-color: red" onclick="changeColour('red')" contenteditable>cf_alive</button>
            <button class="colour-class" style="background-color: maroon" onclick="changeColour('maroon')" contenteditable>cf_dead</button>
            <button class="colour-class" style="background-color: lime" onclick="changeColour('lime')" contenteditable>healthy_alive</button>
            <button class="colour-class" style="background-color: green" onclick="changeColour('green')" contenteditable>healthy_dead</button>
            <img width="20px" src="./images/download.png" id="download-button" onclick="findShapes()" />
        </div>

        <canvas id="canvas-image"></canvas>
        <canvas id="canvas-draw"></canvas>
        <canvas id="canvas-save"></canvas>

    </body>
    <canvas id="canvas-temp"></canvas>

    <script src="./index.js"></script>
    <script src="./rgbs.js"></script>

</html>
